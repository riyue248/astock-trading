<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Paper Trading{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="/static/css/paper.css">
    {% block head %}{% endblock %}
</head>
<body data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top app-navbar">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">📈 A股量化监控台</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li><a class="nav-link {% block nav_dash %}{% endblock %}" href="/">仪表盘</a></li>
                    <li><a class="nav-link {% block nav_trades %}{% endblock %}" href="/trades">交易记录</a></li>
                    <li><a class="nav-link {% block nav_signals %}{% endblock %}" href="/signals">信号监控</a></li>
                    <li><a class="nav-link {% block nav_analysis %}{% endblock %}" href="/analysis">绩效分析</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span id="status-dot" class="badge bg-secondary">● 检查中</span>
                    <span id="clock" class="small text-muted"></span>
                    <button class="btn btn-sm btn-outline-warning" onclick="togglePause()" id="btn-pause">⏯ 暂停</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="container-fluid py-3">
        <section class="hero-strip mb-3">
            <div>
                <h1>交易仪表盘</h1>
                <p>模拟账户、策略权重、信号与风险状态集中监控</p>
            </div>
            <span class="hero-badge">Real-time Paper Trading</span>
        </section>
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center py-2 small text-muted">
        <span>模拟交易 | 数据: 新浪财经 | </span><span id="sse-ind" class="text-warning">● 等待连接</span>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
